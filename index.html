                    columnWidths: [1000, 1200, 1200, 4960, 1000],
                    rows: changeRows
                }));
            }

            // --- CONCLUSI\u00d3N MOTIVADA ---
            children.push(new Paragraph({ children: [new PageBreak()] }));
            const concSecNum = secNum + (evaluatorChanges.length > 0 ? 3 : 2);
            children.push(new Paragraph({
                heading: HeadingLevel.HEADING_1,
                spacing: { before: 200, after: 200 },
                children: [new TextRun({ text: `${concSecNum}. Conclusi\u00f3n motivada`, font: "Arial", size: 32, bold: true, color: "1A3563" })]
            }));

            children.push(new Paragraph({
                spacing: { after: 200 },
                children: [new TextRun({
                    text: `Tras la evaluaci\u00f3n realizada sobre ${currentEmpresa}, basada en el cuestionario de ${cuestionario.length} preguntas distribuidas en los bloques de Programa Anticorrupci\u00f3n (58%) y Canal de Denuncias (42%), y considerando los criterios establecidos en el Manual de Certificaci\u00f3n de la Asociaci\u00f3n ICPF (ref. COSO FRM / ISO 37001 / ISO 37002 / ISO 37003), se concluye lo siguiente:`,
                    font: "Arial", size: 20, color: "333333"
                })]
            }));

            children.push(new Paragraph({
                spacing: { after: 200 },
                children: [new TextRun({
                    text: `La puntuaci\u00f3n global ponderada obtenida es de ${globalScore.toFixed(2)} sobre 4.00, lo que sit\u00faa a la organizaci\u00f3n en el ${levelName}.`,
                    font: "Arial", size: 20, color: "333333"
                })]
            }));

            if (c1Below3.length > 0) {
                children.push(new Paragraph({
                    spacing: { after: 200 },
                    children: [new TextRun({
                        text: `Se han identificado ${c1Below3.length} elemento(s) cr\u00edtico(s) que no alcanzan el umbral m\u00ednimo de 3 puntos: ${c1Below3.map(i => i.id).join(', ')}. Estos elementos son requisitos imprescindibles para la certificaci\u00f3n.`,
                        font: "Arial", size: 20, color: "333333"
                    })]
                }));
            } else {
                children.push(new Paragraph({
                    spacing: { after: 200 },
                    children: [new TextRun({
                        text: "Todos los elementos cr\u00edticos (C1) alcanzan o superan el umbral m\u00ednimo de 3 puntos requerido.",
                        font: "Arial", size: 20, color: "333333"
                    })]
                }));
            }

            if (m1 || m2) {
                children.push(new Paragraph({
                    spacing: { after: 200 },
                    children: [new TextRun({
                        text: `Se han aplicado modificadores cualitativos (${m1 ? 'M1' : ''}${m1 && m2 ? ', ' : ''}${m2 ? 'M2' : ''}) que limitan el nivel m\u00e1ximo alcanzable a Nivel 2.`,
                        font: "Arial", size: 20, color: "333333"
                    })]
                }));
            }

            // Decisi\u00f3n destacada
            children.push(new Paragraph({
                spacing: { before: 200, after: 200 },
                alignment: AlignmentType.CENTER,
                border: { top: { style: BorderStyle.SINGLE, size: 2, color: "1A3563" }, bottom: { style: BorderStyle.SINGLE, size: 2, color: "1A3563" } },
                children: [new TextRun({
                    text: `DECISI\u00d3N: ${certDecision}`,
                    font: "Arial", size: 28, bold: true, color: level >= 3 ? "166534" : level === 2 ? "92400E" : "991B1B"
                })]
            }));

            // Texto de cierre
            let closingText;
            if (level >= 3) closingText = "La organizaci\u00f3n cumple con los requisitos establecidos para la certificaci\u00f3n en prevenci\u00f3n de la corrupci\u00f3n, alcanzando el nivel requerido en todos los elementos cr\u00edticos y obteniendo una puntuaci\u00f3n global suficiente.";
            else if (level === 2) closingText = "La organizaci\u00f3n muestra un sistema en proceso de consolidaci\u00f3n. Se recomienda establecer un plan de mejora para abordar las \u00e1reas identificadas y solicitar una nueva evaluaci\u00f3n.";
            else closingText = "La organizaci\u00f3n no alcanza el umbral m\u00ednimo para la certificaci\u00f3n. Se recomienda desarrollar los aspectos identificados como oportunidades de mejora, con especial atenci\u00f3n a los elementos cr\u00edticos, y solicitar una nueva evaluaci\u00f3n cuando se hayan implementado las acciones necesarias.";

            children.push(new Paragraph({
                spacing: { after: 400 },
                children: [new TextRun({ text: closingText, font: "Arial", size: 20, color: "333333" })]
            }));

            // Cl\u00e1usula
            children.push(new Paragraph({
                spacing: { before: 400, after: 100 },
                border: { top: { style: BorderStyle.SINGLE, size: 1, color: "CCCCCC" } },
                children: [new TextRun({
                    text: "Esta certificaci\u00f3n se basa en una revisi\u00f3n de alcance limitado conforme al Manual de Certificaci\u00f3n de la Asociaci\u00f3n ICPF y no constituye una garant\u00eda de ausencia de irregularidades.",
                    font: "Arial", size: 16, italics: true, color: "999999"
                })]
            }));

            // ---------- CREAR Y DESCARGAR ----------
            const doc = new Document({
                styles: {
                    default: { document: { run: { font: "Arial", size: 22 } } },
                    paragraphStyles: [
                        { id: "Heading1", name: "Heading 1", basedOn: "Normal", next: "Normal", quickFormat: true,
                            run: { size: 32, bold: true, font: "Arial", color: "1A3563" },
                            paragraph: { spacing: { before: 240, after: 200 } } },
                    ]
                },
                sections: [{
                    properties: {
                        page: {
                            size: { width: 11906, height: 16838 },
                            margin: { top: 1440, right: 1200, bottom: 1440, left: 1200 }
                        }
                    },
                    headers: {
                        default: new Header({
                            children: [new Paragraph({
                                alignment: AlignmentType.RIGHT,
                                children: [new TextRun({ text: "ICPF - Informe de Evaluaci\u00f3n | " + currentEmpresa, font: "Arial", size: 14, color: "AAAAAA", italics: true })]
                            })]
                        })
                    },
                    footers: {
                        default: new Footer({
                            children: [new Paragraph({
                                alignment: AlignmentType.CENTER,
                                children: [
                                    new TextRun({ text: "P\u00e1gina ", font: "Arial", size: 16, color: "AAAAAA" }),
                                    new TextRun({ children: [PageNumber.CURRENT], font: "Arial", size: 16, color: "AAAAAA" }),
                                ]
                            })]
                        })
                    },
                    children: children
                }]
            });

            try {
                const buffer = await Packer.toBlob(doc);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(buffer);
                link.download = `Informe_Evaluacion_${currentEmpresa.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0, 10)}.docx`;
                link.click();
                showAlert('Informe Word descargado correctamente', 'success');
            } catch (error) {
                showAlert('Error generando Word: ' + error.message, 'error');
                console.error(error);
            }
        }

        // ==================== RESET DE DATOS ====================
        function showResetDialog() {
            if (!isSuperAdminCache) { showAlert('Solo un superadministrador puede ejecutar el reset', 'error'); return; }
            showModal('Resetear base de datos',
                `<div style="text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 16px;">\u26a0\ufe0f</div>
                    <p style="font-size: 15px; font-weight: 600; color: #991b1b; margin-bottom: 12px;">ATENCI\u00d3N: Esta acci\u00f3n es irreversible</p>
                    <p style="color: #666; margin-bottom: 16px;">Se eliminar\u00e1n todos los encuestados, respuestas, evaluadores y evaluaciones almacenadas en la base de datos.</p>
                    <p style="font-size: 13px; color: #999;">Escriba <strong>CONFIRMAR</strong> para habilitar el bot\u00f3n de borrado:</p>
                    <input type="text" id="resetConfirmInput" placeholder="Escriba CONFIRMAR" style="width: 100%; padding: 10px; border: 2px solid #fecaca; border-radius: 8px; font-size: 14px; text-align: center; margin-top: 8px; font-family: Arial, sans-serif;" oninput="checkResetConfirm()">
                </div>`,
                `<button class="btn danger" id="resetBtn" disabled onclick="confirmReset()">Eliminar todos los datos</button>
                 <button class="btn outline" onclick="closeModal()">Cancelar</button>`
            );
        }

        function checkResetConfirm() {
            const val = document.getElementById('resetConfirmInput').value;
            const btn = document.getElementById('resetBtn');
            btn.disabled = val !== 'CONFIRMAR';
        }

        async function confirmReset() {
            closeModal();
            // Segunda confirmaci\u00f3n
            showModal('Confirmaci\u00f3n final',
                `<div style="text-align: center;">
                    <p style="font-size: 15px; font-weight: 600; color: #991b1b;">\u00bfEst\u00e1 ABSOLUTAMENTE seguro?</p>
                    <p style="color: #666; margin-top: 8px;">Esta es la \u00faltima oportunidad para cancelar. Todos los datos se perder\u00e1n de forma permanente.</p>
                </div>`,
                `<button class="btn danger" onclick="executeReset()">S\u00ed, eliminar todo</button>
                 <button class="btn outline" onclick="closeModal()">No, cancelar</button>`
            );
        }

        async function executeReset() {
            if (!isSuperAdminCache) { showAlert('Operación no autorizada', 'error'); return; }
            closeModal();
            showAlert('Eliminando datos...', 'info');
            try {
                // Eliminar respondentes
                const respondents = await db.collection('respondents').get();
                for (const doc of respondents.docs) { await doc.ref.delete(); }
                // Eliminar respuestas
                const responses = await db.collection('responses').get();
                for (const doc of responses.docs) { await doc.ref.delete(); }
                // Eliminar evaluadores
                const evaluators = await db.collection('evaluators').get();
                for (const doc of evaluators.docs) { await doc.ref.delete(); }
                // Eliminar evaluaciones
                const evaluations = await db.collection('evaluations').get();
                for (const doc of evaluations.docs) { await doc.ref.delete(); }

                showAlert('Todos los datos han sido eliminados correctamente', 'success');
                renderAdminDashboard();
            } catch (error) {
                showAlert('Error durante el reset: ' + error.message, 'error');
            }
        }

        // ==================== ARRANQUE ====================
        // Manejo del enlace mágico al volver del email
        async function handleEmailLinkOnLoad() {
            try {
                if (auth.isSignInWithEmailLink(window.location.href)) {
                    await completeMagicLink();
                    return true;
                }
            } catch (e) { /* ignora */ }
            return false;
        }

        // Listener de cambios de estado de autenticación
        auth.onAuthStateChanged(async (user) => {
            if (user && user.email) {
                await determineRolesAndProceed(user.email);
            } else {
                renderMainEntry();
            }
        });

        // Si la página se abre con un enlace mágico, completarlo antes que nada
        window.addEventListener('load', () => { handleEmailLinkOnLoad(); });

    </script>
</body>
</html>
